name: Deploy Backend to VPS
on:
  push:
    branches: [production]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: pducasse/philocircus_backend:latest

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.OVH_IP }}
          username: ${{ secrets.OVH_USER }}
          key: ${{ secrets.OVH_KEY }}
          script: |
            docker pull pducasse/philocircus_backend:latest
            docker stop philocircus_backend || true
            docker rm philocircus_backend || true
            docker run -d -p 8000:8000 --name philocircus_backend -e HF_TOKEN=${{ secrets.HF_TOKEN }} pducasse/philocircus_backend:latest
